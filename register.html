<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/auth.css">
    <title>Register - StokPailot</title>
</head>

<body>
    <main>
        <section class="auth-section">
            <div class="auth-image">
                <img src="assets/img/StokPailot.png" alt="Register Image" width="30px" height="30px">
            </div>

            <div class="register-container">
                <!-- HEADER -->
                <div class="register-header">
                    <img src="assets/img/logoicon.png" alt="StokPailot logo" width="60" height="60">
                    <a href="index.html">
                        <h1>StokPailot</h1>
                    </a>
                    <p>Smart Inventory Management</p>
                </div>

                <!-- FORM BOX -->
                <div class="auth-box">
                    <h2>Create Account</h2>

                    <p class="auth-text">
                        Join StokPailot and manage
                        your inventory smarter.
                    </p>

                    <input type="text" id="fullname" placeholder="Full Name">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="text" id="newUsername" placeholder="Username">
                    <input type="password" id="newPassword" placeholder="Password">

                    <button onclick="register()">Register</button>

                    <p class="switch-auth">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>

                    <p id="registerError"></p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/auth.js"></script>
</body>

</html>
